services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Davvy
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: base64:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: davvy
      DB_USERNAME: davvy
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_DB_SEED: "true"
      RUN_SCHEDULER: "true"
      ENABLE_PUBLIC_REGISTRATION: "false"
      ENABLE_OWNER_SHARE_MANAGEMENT: "true"
      ENABLE_DAV_COMPATIBILITY_MODE: "false"
      ENABLE_AUTOMATED_BACKUPS: "false"
      BACKUPS_LOCAL_ENABLED: "true"
      BACKUPS_LOCAL_PATH: /var/www/html/storage/app/backups
      BACKUPS_S3_ENABLED: "false"
      BACKUPS_S3_DISK: s3
      BACKUPS_S3_PREFIX: davvy-backups
      BACKUPS_SCHEDULE_TIMES: 02:30
      BACKUPS_TIMEZONE: UTC
      BACKUPS_WEEKLY_DAY: "0"
      BACKUPS_MONTHLY_DAY: "1"
      BACKUPS_YEARLY_MONTH: "1"
      BACKUPS_YEARLY_DAY: "1"
      BACKUPS_RETENTION_DAILY: "7"
      BACKUPS_RETENTION_WEEKLY: "4"
      BACKUPS_RETENTION_MONTHLY: "12"
      BACKUPS_RETENTION_YEARLY: "3"
      DEFAULT_ADMIN_EMAIL: admin@davvy.local
      DEFAULT_ADMIN_PASSWORD: ChangeMe123!
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:$${PORT:-8080}/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: davvy
      POSTGRES_USER: davvy
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
