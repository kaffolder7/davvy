services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      APP_NAME: Davvy
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: davvy
      DB_USERNAME: davvy
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      ENABLE_PUBLIC_REGISTRATION: "false"
      ENABLE_OWNER_SHARE_MANAGEMENT: "true"
      DEFAULT_ADMIN_EMAIL: admin@davvy.local
      DEFAULT_ADMIN_PASSWORD: ChangeMe123!

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: davvy
      POSTGRES_USER: davvy
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
