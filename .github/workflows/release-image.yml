name: Release Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-image-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  php-quality-gate:
    name: Release Gate - PHP quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies (no scripts)
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Lint PHP files
        run: |
          find app bootstrap config database routes tests -type f -name '*.php' -print0 | xargs -0 -r -n1 -P4 php -l

      - name: Run Pint in test mode
        run: ./vendor/bin/pint --test

  dockerized-tests-gate:
    name: Release Gate - Dockerized tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Ensure Composer cache directory exists
        run: mkdir -p "$HOME/.composer/cache/files"

      - name: Run Dockerized test suite
        run: |
          docker compose run --build --rm \
            --user root \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache/files:/tmp/composer-cache" \
            --entrypoint sh app -lc "cp .env.example .env && composer install --prefer-dist --no-interaction && APP_ENV=testing APP_KEY='base64:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=' DB_CONNECTION=sqlite DB_DATABASE=':memory:' CACHE_STORE=array SESSION_DRIVER=array QUEUE_CONNECTION=sync MAIL_MAILER=array php artisan test"

      - name: Tear down Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans

  container-build-gate:
    name: Release Gate - Container build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image smoke test (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Build and Publish GHCR Image
    needs:
      - php-quality-gate
      - dockerized-tests-gate
      - container-build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      COOLIFY_WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine attestation support
        id: attest_support
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ github.event.repository.owner.type }}" = "User" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        if: ${{ steps.attest_support.outputs.enabled == 'true' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Trigger Coolify webhook (optional)
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_WEBHOOK_TOKEN:-}" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer ${COOLIFY_WEBHOOK_TOKEN}" \
              "${COOLIFY_WEBHOOK_URL}"
          else
            curl -fsS -X POST "${COOLIFY_WEBHOOK_URL}"
          fi

      - name: Publish workflow summary
        env:
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## GHCR image published"
            echo ""
            echo "Image: \`${{ env.REGISTRY }}/${{ steps.image.outputs.name }}\`"
            echo ""
            echo "Tags:"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- \`$line\`"
            done <<< "$PUBLISHED_TAGS"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            if [ "${{ steps.attest_support.outputs.enabled }}" = "true" ]; then
              echo "Attestation: published"
            else
              echo "Attestation: skipped (unsupported for private user-owned repositories)"
            fi
            echo ""
            if [ -n "${COOLIFY_WEBHOOK_URL:-}" ]; then
              echo "Coolify webhook: triggered"
            else
              echo "Coolify webhook: skipped (set \`COOLIFY_WEBHOOK_URL\` secret to enable)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
