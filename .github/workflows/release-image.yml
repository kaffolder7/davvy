name: Release Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-image-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and Publish GHCR Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      COOLIFY_WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine attestation support
        id: attest_support
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ github.event.repository.owner.type }}" = "User" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        if: ${{ steps.attest_support.outputs.enabled == 'true' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Trigger Coolify webhook (optional)
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_WEBHOOK_TOKEN:-}" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer ${COOLIFY_WEBHOOK_TOKEN}" \
              "${COOLIFY_WEBHOOK_URL}"
          else
            curl -fsS -X POST "${COOLIFY_WEBHOOK_URL}"
          fi

      - name: Publish workflow summary
        env:
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## GHCR image published"
            echo ""
            echo "Image: \`${{ env.REGISTRY }}/${{ steps.image.outputs.name }}\`"
            echo ""
            echo "Tags:"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- \`$line\`"
            done <<< "$PUBLISHED_TAGS"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            if [ "${{ steps.attest_support.outputs.enabled }}" = "true" ]; then
              echo "Attestation: published"
            else
              echo "Attestation: skipped (unsupported for private user-owned repositories)"
            fi
            echo ""
            if [ -n "${COOLIFY_WEBHOOK_URL:-}" ]; then
              echo "Coolify webhook: triggered"
            else
              echo "Coolify webhook: skipped (set \`COOLIFY_WEBHOOK_URL\` secret to enable)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
