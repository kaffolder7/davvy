name: Release Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run_tag:
        description: "Tag used for dry-run image metadata (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-image-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  php-quality-gate:
    name: Release Gate - Lint & format
    uses: ./.github/workflows/lint-checks.yml

  dockerized-tests-gate:
    name: Release Gate - Dockerized tests
    uses: ./.github/workflows/pr-tests.yml

  container-build-gate:
    name: Release Gate - Container build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image smoke test (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Build and Publish GHCR Image
    if: ${{ github.event_name == 'release' }}
    needs:
      - php-quality-gate
      - dockerized-tests-gate
      - container-build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      COOLIFY_WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine attestation support
        id: attest_support
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ github.event.repository.owner.type }}" = "User" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        if: ${{ steps.attest_support.outputs.enabled == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Trigger Coolify webhook (optional)
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_WEBHOOK_TOKEN:-}" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer ${COOLIFY_WEBHOOK_TOKEN}" \
              "${COOLIFY_WEBHOOK_URL}"
          else
            curl -fsS -X POST "${COOLIFY_WEBHOOK_URL}"
          fi

      - name: Publish workflow summary
        env:
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## GHCR image published"
            echo ""
            echo "Image: \`${{ env.REGISTRY }}/${{ steps.image.outputs.name }}\`"
            echo ""
            echo "Tags:"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- \`$line\`"
            done <<< "$PUBLISHED_TAGS"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            if [ "${{ steps.attest_support.outputs.enabled }}" = "true" ]; then
              echo "Attestation: published"
            else
              echo "Attestation: skipped (unsupported for private user-owned repositories)"
            fi
            echo ""
            if [ -n "${COOLIFY_WEBHOOK_URL:-}" ]; then
              echo "Coolify webhook: triggered"
            else
              echo "Coolify webhook: skipped (set \`COOLIFY_WEBHOOK_URL\` secret to enable)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  dry-run:
    name: Release Dry Run - Validate publish stage
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - php-quality-gate
      - dockerized-tests-gate
      - container-build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (dry run)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ inputs.dry_run_tag }}
            type=semver,pattern={{version}},value=${{ inputs.dry_run_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.dry_run_tag }}
            type=semver,pattern={{major}},value=${{ inputs.dry_run_tag }}
            type=sha,prefix=sha-

      - name: Build image (dry run, no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dry-run workflow summary
        env:
          DRY_RUN_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Release dry run passed"
            echo ""
            echo "Image: \`${{ env.REGISTRY }}/${{ steps.image.outputs.name }}\`"
            echo ""
            echo "Resolved tags:"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- \`$line\`"
            done <<< "$DRY_RUN_TAGS"
            echo ""
            echo "Push: skipped"
            echo "Attestation: skipped"
            echo "Coolify webhook: skipped"
            echo ""
            echo "Dry-run input tag: \`${{ inputs.dry_run_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
