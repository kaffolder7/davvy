name: PR Tests

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "phpunit.xml"
      - "Dockerfile"
      - "compose.yml"
      - ".env.example"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/lint-checks.yml"
      - ".github/workflows/release-image.yml"

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dockerized-tests:
    name: Dockerized Laravel Tests
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Ensure Composer cache directory exists
        run: mkdir -p "$HOME/.composer/cache/files"

      - name: Run Dockerized test suite
        run: |
          docker compose run --build --rm \
            --user root \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache/files:/tmp/composer-cache" \
            --entrypoint sh app -lc "cp .env.example .env && composer install --prefer-dist --no-interaction && APP_ENV=testing APP_KEY='base64:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=' DB_CONNECTION=sqlite DB_DATABASE=':memory:' CACHE_STORE=array SESSION_DRIVER=array QUEUE_CONNECTION=sync MAIL_MAILER=array php artisan test"

      - name: Tear down Docker services
        if: always()
        run: docker compose down --volumes --remove-orphans
