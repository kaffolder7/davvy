name: PR Tests

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "phpunit.xml"
      - "Dockerfile"
      - "docker/**"
      - "compose.yml"
      - ".env.example"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/lint-checks.yml"
      - ".github/workflows/release-image.yml"

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dockerized-tests:
    name: Dockerized Laravel Tests
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build CI test image
        run: docker build --target ci-test -t davvy-ci-test .

      - name: Run Dockerized test suite
        run: docker run --rm davvy-ci-test
