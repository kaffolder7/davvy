name: Lint & Format Checks

on:
  workflow_call:
  push:
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "package-lock.json"
      - ".env.example"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/lint-checks.yml"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/release-image.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "package-lock.json"
      - ".env.example"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/lint-checks.yml"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/release-image.yml"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Lint PHP files
        run: |
          find app bootstrap config database routes tests -type f -name '*.php' -print0 | xargs -0 -r -n1 -P4 php -l

  pint-format:
    name: Laravel Pint (format check)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies (no scripts)
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run Pint in test mode
        run: |
          ./vendor/bin/pint --test

  frontend-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Vitest suite
        run: npm test
