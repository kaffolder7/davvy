name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "docker/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "package-lock.json"
      - "phpunit.xml"
      - "Dockerfile"
      - "compose.yml"
      - ".env.example"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/*.yml"

  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  review_pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run AI PR review
        uses: ./.github/actions/ai-pr-review
        with:
          github_token: ${{ github.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          repo: ${{ github.repository }}
          pr_number: ${{ github.event.pull_request.number }}
          pr_title: ${{ github.event.pull_request.title }}
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}

  review_comment_command:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/ai review'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Fetch PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          curl -fsS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > pr.json

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head.sha' pr.json)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(jq -r '.base.sha' pr.json)" >> "$GITHUB_OUTPUT"
          echo "is_same_repo=$(jq -r 'if .head.repo.full_name == .base.repo.full_name then "true" else "false" end' pr.json)" >> "$GITHUB_OUTPUT"
          echo "is_draft=$(jq -r '.draft' pr.json)" >> "$GITHUB_OUTPUT"
          {
            echo "pr_title<<EOF"
            jq -r '.title' pr.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stop on fork PRs
        if: steps.meta.outputs.is_same_repo != 'true'
        run: echo "Skipping fork PR."

      - name: Stop on draft PRs
        if: steps.meta.outputs.is_draft == 'true'
        run: echo "Skipping draft PR."

      - name: Add acknowledgement reaction
        if: steps.meta.outputs.is_same_repo == 'true' && steps.meta.outputs.is_draft != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -d '{"content":"eyes"}' >/dev/null || true

      - name: Check out PR HEAD
        if: steps.meta.outputs.is_same_repo == 'true' && steps.meta.outputs.is_draft != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0

      - name: Run AI PR review
        if: steps.meta.outputs.is_same_repo == 'true' && steps.meta.outputs.is_draft != 'true'
        uses: ./.github/actions/ai-pr-review
        with:
          github_token: ${{ github.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          repo: ${{ github.repository }}
          pr_number: ${{ steps.meta.outputs.pr_number }}
          pr_title: ${{ steps.meta.outputs.pr_title }}
          base_sha: ${{ steps.meta.outputs.base_sha }}
          head_sha: ${{ steps.meta.outputs.head_sha }}

      - name: Add success reaction
        if: always() && steps.meta.outputs.is_same_repo == 'true' && steps.meta.outputs.is_draft != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -d '{"content":"+1"}' >/dev/null || true
