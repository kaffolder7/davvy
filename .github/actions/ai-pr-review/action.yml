name: "AI PR Review"
description: "Davvy-specific AI PR review with related-context retrieval and inline review comments"

inputs:
  github_token:
    description: "GitHub token"
    required: true
  openai_api_key:
    description: "OpenAI API key"
    required: true
  repo:
    description: "owner/repo"
    required: true
  pr_number:
    description: "Pull request number"
    required: true
  pr_title:
    description: "Pull request title"
    required: true
  base_sha:
    description: "Base SHA"
    required: true
  head_sha:
    description: "Head SHA"
    required: true

runs:
  using: "composite"

  steps:
    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y jq python3 curl

    - name: Build review context
      id: prep
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base_sha }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/build_review_context.py"

    - name: Build related repo context
      if: steps.prep.outputs.docs_only != 'true' && steps.prep.outputs.has_changes == 'true'
      id: context
      shell: bash
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/build_related_context.py"

    - name: Cleanup previous AI comments
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/cleanup_comments.py"

    - name: Create skip summary
      if: steps.prep.outputs.docs_only == 'true' || steps.prep.outputs.has_changes == 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        BODY="<!-- ai-pr-review-summary -->
        ## AI PR Review Summary

        Skipped AI review because this PR appears to be docs-only or has no changed files.

        ### Category counts
        - \`security\`: 0
        - \`correctness\`: 0
        - \`tests\`: 0
        - \`performance\`: 0
        - \`breaking-change\`: 0

        - No high-signal findings."

        jq -n --arg body "$BODY" '{body:$body}' > payload.json

        curl -fsS -X POST \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
          -d @payload.json >/dev/null

    - name: Ask OpenAI for Davvy-specific review
      if: steps.prep.outputs.docs_only != 'true' && steps.prep.outputs.has_changes == 'true'
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        PR_TITLE: ${{ inputs.pr_title }}
        PR_NUMBER: ${{ inputs.pr_number }}
        REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/request_review.py"

    - name: Filter findings
      if: steps.prep.outputs.docs_only != 'true' && steps.prep.outputs.has_changes == 'true'
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base_sha }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/filter_findings.py"

    - name: Post inline review
      if: steps.prep.outputs.docs_only != 'true' && steps.prep.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/post_inline_review.py"

    - name: Post summary
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
        DOCS_ONLY: ${{ steps.prep.outputs.docs_only }}
        HAS_CHANGES: ${{ steps.prep.outputs.has_changes }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/post_summary.py"
