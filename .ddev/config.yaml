name: davvy
type: laravel
docroot: public
php_version: "8.4"
webserver_type: nginx-fpm
xdebug_enabled: false

additional_hostnames: []
additional_fqdns: []

database:
  type: postgres
  version: "16"

use_dns_when_possible: true
composer_version: "2"
nodejs_version: "24"

web_environment:
  - VITE_PORT=5173

web_extra_exposed_ports:
  - name: vite
    container_port: 5173
    http_port: 5172
    https_port: 5173
